apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
spec:
  replicas: 1

  selector:
    matchLabels:
      app: redis

  template:
    metadata:
      labels:
        app: redis

    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: {{ .Values.redis.port }}

          args:
            - "--appendonly"
            - "yes"
            - "--requirepass"
            - "changemoi"

          env:
            - name: REDIS_PASSWORD
              value: "changemoi"

          volumeMounts:
            - name: redis-data
              mountPath: /data

      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-pvc