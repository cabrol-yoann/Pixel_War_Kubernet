apiVersion: v1
kind: Pod
metadata:
  name: postgres
  labels:
    app: postgres
spec:
  containers:
  - name: postgres
    image: postgres:15-alpine
    env:
      - name: POSTGRES_DB
        value: pixelwar
      - name: POSTGRES_USER
        value: root
      - name: POSTGRES_PASSWORD
        value: root
    ports:
      - containerPort: 5432

apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432